# EPSILON Trading Simulator — Render Blueprint
# Frontend (Next.js) on Render + Backend (FastAPI) on Railway
# Docs: https://render.com/docs/blueprint-spec

services:
  # ─── Frontend (Next.js) — 国内可访问 ──────────────────────────
  - type: web
    name: epsilon-web
    runtime: node
    region: singapore
    plan: free
    buildCommand: cd website && npm install && npx prisma generate && npm run build
    startCommand: cd website && npm start
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: epsilon-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        value: "https://epsilon-web.onrender.com"
      - key: NEXT_PUBLIC_API_URL
        value: "https://api-production-2b871.up.railway.app"
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false

# ─── PostgreSQL（给 NextAuth 用户认证用）─────────────────────
databases:
  - name: epsilon-db
    region: singapore
    plan: free
    databaseName: epsilon
